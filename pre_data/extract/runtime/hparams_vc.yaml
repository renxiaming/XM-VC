
---
Global_settings:
    acoustic_type: 'Mel'
    model_type: 'CBHGARModel'
    collate_fn_type: 'max' #[min,max]
    random_seed: 191023 # Random state for reproducibility
    restore: True # Whether to restore saved paramters

Acoustic_data_settings:
    min_level_db: -115 # minimum level of dbs when set lower bound in amp_to_db
    ref_level_db: 20 # shift db before signal normalization
    fmin: 0 # To test depending on dataset
    fmax: 8000 # To test depending on dataset, this value is for 16khz wav
    sample_rate: 16000  # Default sample rate is 16khz
    auto_resample: False # Whether auto re-sample original wavs
    rescale: False  # Whether to do waveform energy normalization
    rescaling_max: 0.999  # Waveform energy normalization scale
    preemphasis: 0.97
    trim_silence: False # Whether to clip wav silence at beginning and end
    num_silent_frames: 4  # Whether to pad 4 frames on both sides of waveforms
    max_acoustic_length: 2000  # Ignore data whose number of frame is more than max_acoustic_length
    save_align_wavs: False # Whether to save the aligned wavs
    signal_normalization: True  # Set as true for signal normalization
    allow_clipping_in_normalization: True # Spectrograms normalization/scaling and clipping
    symmetric_acoustic: True  # Whether to scale the data to be symmetric around 0
    # max absolute value of data. If symmetric data will be [-max, max] else [0, max]
    max_abs_value: 4. # Absolute value of acoustic-spectrograms
    trim_fft_size: 512 # fft size used in trimming
    trim_hop_size: 128 # hop size used in trimming
    trim_top_db: 30 # top db used in trimming sensitive to each dataset
    min_db: -115 # minimum db values which is used in acoustic' normalize

input_settings:
    input_type: 'BN'
    pad_sli: False
    pad_sli_frame: 30
    support_input_type: ['BN']
    input_dim: 512 #ppgs from ASR or 1 in phone sequence
    xvector_dim: 512 #xvector default dim
    num_spkr: 20 #nums spks in model
    ppg_dim: 512
    spk_embedding_dim: 256
    block_size: 160
    signal_length: 64000
    window_size: 128
    use_xvector: False
    lf0_norm: 'minmax' # we support {raw, z-score, minmax}
    energy_norm: 'minmax' # we support {raw, z-score, minmax}
    features_list: ['inputs', 'acoustic_targets', 'spks', 'inputs_length']
    segment_length: 4
    use_kaldiio: True
    kaldi_list: ['12non.scp', 'mels.scp', 'lf0.scp', 'energy.scp', '12non.scp']
    
Mel_settings:
    acoustic_dim: 80  # Dimension of acousitc spectrograms
    max_acoustic_length: 2000
    num_freq: 1025  # Only used when adding linear spectrograms post processing network
    fft_size: 1024  # FFT size for fourier transforming
    n_fft: 1024  # Extra window size is filled with 0 paddings to match this parameter
    hop_size: 200 # hop_size between acoustic feature and waveforms
    win_size: 800 # For 22050Hz 1100 ~:  50 ms (If None win_size :  n_fft)
    frame_shift_ms: None # if hop_size is not set can be calculated by this
    max_wav_value: 32768.0

FFT_settings:
    hidden_size: 384
    sfnum_heads: 2
    attention_dropout: 0.1
    num_hidden_layers: 6
    acoustic_dim: 80
    layer_postprocess_dropout: 0.1
    output_attention: True
    input_size: 384

Prenet:
    prenet_units: [256]
    prenet_dropout_rate: 0.3
    prenet_act: 'relu' #you can select relu or leakyrelu

PostNet:
    postnet_num_layers: 5  # number of postnet convolutional layers
    postnet_kernel_size: 3 # size of postnet convolution filters for each layer
    postnet_channels: 256  # number of postnet convolution filters for each layer
    postnet_dropout_rate: 0.0
    postnet_act: 'tanh' #you can select relu or leakyrelu

CBHGAR:
    cbhg_kernels: 8  # All kernel sizes from 1 to cbhg_kernels will be used in the convolution bank of CBHG to act as "K-grams"
    bank_kernel: 1
    cbhg_conv_channels: 128  # Channels of the convolution bank
    cbhg_pool_size: 2  # pooling size of the CBHG
    cbhg_projection_channels: 128 # projection channels of the CBHG (1st projection 2nd is automatically set to acoustic_dim)
    cbhg_projection_kernel_size: 3  # kernel_size of the CBHG projections
    cbhg_highwaynet_layers: 4  # Number of HighwayNet layers
    cbhg_highway_units: 128  # Number of units used in HighwayNet fully connected layers
    cbhg_rnn_units: 128 # Number of GRU units. CBHG output is 2x rnn_units in shape

ARModel:
    ar_prenet_units: [128,128]
    ar_prenet_dropout: 0.5
    decoder_rnn_layers: 2  # Number of decoder lstm layers
    decoder_rnn_units: 256  # Number of decoder lstm units on each layer
    decoder_rnn_dropout: 0.0
    decoder_prenet_drop_rate: 0.5  # Dropout rate for all convolutional layers


Training_settings:
    batch_size: 32  # Number of training samples on each training steps or 32
    num_workers: 4 #num workers use in dataloader
    use_cuda: True #wheather use cuda in training or validation process
    device_ids: [0] #use single GPU
    save_summary_steps: 5000
    save_checkpoint_epochs: 30
    max_epoches: 240
    max_steps: 1000000
    save_checkpoints_steps: 5000
    initial_learning_rate: 1e-3
    decay_epochs: 20
    decay_rate: 0.7
    adam_beta1: 0.8
    adam_beta2: 0.99
    lr_decay: 0.999
    reg_weight: 1e-4
    clip_grad_norm: 1.0
    vaild_dur_training: True
    use_lf0: False
    use_energy: False
    use_uv: False
    use_vq: False
    use_vq_ref: False #use vq as input for reference encoder
    use_bn_ref: False
    predict_linear: False #use linear spectrum at the sam time
    use_gan: False
    use_bgru: True
    use_asr: False
    use_norm_loss: False
    eps: 1e-9

Griffin Lim:
    synthesize_wave: False  # Whether to conduct griffin-lim
    power: 1.5 # power values for singals
    griffin_lim_iters: 60 # epochs for iteratively estimate phase

Distributed_setting:
    backend: "nccl"
    url: "tcp://localhost:23344"
    world_size: 1

Streaming_setting:
    use_causal: True
    chunk_size: 10