accum_grad: 1
cmvn_file: data/train/global_cmvn
dataset_conf:
  batch_conf:
    batch_size: 16
    batch_type: static
  fbank_conf:
    dither: 1.0
    frame_length: 25
    frame_shift: 10
    num_mel_bins: 80
  filter_conf:
    max_length: 40960
    min_length: 0
    token_max_length: 200
    token_min_length: 1
  resample_conf:
    resample_rate: 16000
  shuffle: true
  shuffle_conf:
    shuffle_size: 1500
  sort: true
  sort_conf:
    sort_size: 500
  spec_aug: true
  spec_aug_conf:
    max_f: 10
    max_t: 50
    num_f_mask: 2
    num_t_mask: 2
  speed_perturb: true
decoder: bitransformer
decoder_conf:
  attention_heads: 4
  dropout_rate: 0.1
  linear_units: 2048
  num_blocks: 3
  positional_dropout_rate: 0.1
  r_num_blocks: 3
  self_attention_dropout_rate: 0.1
  src_attention_dropout_rate: 0.1
encoder: conformer
encoder_conf:
  activation_type: swish
  add_l_num_blocks: 0
  attention_dropout_rate: 0.1
  attention_heads: 4
  b_static_chunk_size: 0
  causal: true
  cnn_module_kernel: 9
  cnn_module_norm: layer_norm
  dropout_rate: 0.1
  dual: true
  input_layer: conv2d
  linear_units: 2048
  normalize_before: true
  num_blocks: 12
  output_size: 256
  pos_enc_layer_type: rel_pos
  positional_dropout_rate: 0.1
  s_ctc_layer: 7
  s_static_chunk_size: 0
  selfattention_layer_type: rel_selfattn
  two_chunk: false
  use_cnn_module: true
  use_dynamic_chunk: true
  use_dynamic_left_chunk: false
grad_clip: 5
input_dim: 80
is_json_cmvn: true
log_interval: 100
max_epoch: 360
model_conf:
  ctc_weight: 0.3
  distill_weight: 0.0
  is_l_ctc: true
  is_l_ctc_non_stream: false
  length_normalized_loss: false
  lsm_weight: 0.1
  regular: false
  reverse_weight: 0.3
  s_chunk_weight: 0.5
optim: adam
optim_conf:
  lr: 0.001
output_dim: 5178
scheduler: warmuplr
scheduler_conf:
  warmup_steps: 25000
weight_scheduler: DistillWeightLR
weight_update:
  final_weight: 0.0
  fix_start_epoch: 0
  increase_start_epoch: 0
  increase_type: exp
  initial_weight: 0.0
  update_weight: false
