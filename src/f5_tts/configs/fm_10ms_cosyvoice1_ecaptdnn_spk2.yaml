hydra:
  run:
    dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}${model.tokenizer}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    
datasets:
  name: 4wh_filtered_dataset_remapped.txt #4wtrain_dataset_online_s3token1_filter.txt  # dataset name
  dataset_type: OnlineDataset
  batch_size_per_gpu: 4500  # 8 GPUs, 8 * 38400 = 307200
  batch_size_type: frame  # "frame" or "sample"
  max_samples: 64 # max sequences per batch if use frame-wise batch_size. we set 32 for small models, 64 for base models
  num_workers: 1
  # num_workers: 8


optim:
  epochs: 50
  learning_rate: 7.5e-5
  num_warmup_updates: 20000  # warmup updates
  grad_accumulation_steps: 1  #3010 梯度累计2 node60 4卡训练 # note: updates = steps / grad_accumulation_steps 
  max_grad_norm: 1.0  # gradient clipping
  bnb_optimizer: False  # use bnb 8bit AdamW optimizer or not

model:
  name: F5TTS_fm_10ms_ecapa_tdnn_spk  # model name
  tokenizer: cosyvoice1  # tokenizer type
  tokenizer_path: None  # if tokenizer = 'custom', define the path to the tokenizer you want to use (should be vocab.txt)
  text_num_embeds: 4096
  arch:
    dim: 656
    depth: 22
    heads: 16
    ff_mult: 2
    text_dim: 256
    conv_layers: 4
    checkpoint_activations: False  # recompute activations and save memory for extra compute
  mel_spec:
    target_sample_rate: 16000
    n_mel_channels: 80
    hop_length: 160
    win_length: 640
    n_fft: 1024
    mel_spec_type: hifigan  # 'vocos' or 'bigvgan'
  vocoder:
    is_local: False  # use local offline ckpt or not
    local_path: None  # local vocoder path

ckpts:
  logger: wandb  # wandb | tensorboard | None
  save_per_updates: 50000  # save checkpoint per updates
  keep_last_n_checkpoints: -1  # -1 to keep all, 0 to not save intermediate, > 0 to keep last N checkpoints
  last_per_updates: 5000  # save last checkpoint per updates
  save_dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}${model.tokenizer}
